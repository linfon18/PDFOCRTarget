name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Self-Contained 版本（不需要安装 .NET 运行时）
          - os: windows-latest
            rid: win-x64
            self_contained: true
            asset_name: PDFOCRTarget-win-x64-Self-Contain.exe
          - os: ubuntu-latest
            rid: linux-x64
            self_contained: true
            asset_name: PDFOCRTarget-linux-x64-Self-Contain
          - os: macos-latest
            rid: osx-arm64
            self_contained: true
            asset_name: PDFOCRTarget-osx-arm64-Self-Contain
          # 依赖框架版本（需要安装 .NET 9 运行时，体积更小）
          - os: windows-latest
            rid: win-x64
            self_contained: false
            asset_name: PDFOCRTarget-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            self_contained: false
            asset_name: PDFOCRTarget-linux-x64
          - os: macos-latest
            rid: osx-arm64
            self_contained: false
            asset_name: PDFOCRTarget-osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained ${{ matrix.self_contained }} -o ./publish

      - name: Find and rename binary
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            if [ -f "publish/PDFOCRTarget.exe" ]; then
              cp "publish/PDFOCRTarget.exe" "${{ matrix.asset_name }}"
            else
              echo "ERROR: PDFOCRTarget.exe not found"
              ls -la publish/
              exit 1
            fi
          else
            if [ -f "publish/PDFOCRTarget" ]; then
              cp "publish/PDFOCRTarget" "${{ matrix.asset_name }}"
              chmod +x "${{ matrix.asset_name }}"
            else
              echo "ERROR: PDFOCRTarget binary not found"
              ls -la publish/
              exit 1
            fi
          fi

      - name: Check file size
        shell: bash
        run: |
          echo "=== Artifact size ==="
          ls -lh "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PDFOCRTarget ${{ github.ref_name }}
          body: |
            ## PDFOCRTarget ${{ github.ref_name }}

            全平台 PDF 图片转文字 OCR 识别转换工具

            ### 功能
            - OCR 文字识别（图片/扫描版 PDF）
            - PDF 照片转可搜索 PDF 文本
            - 关键词搜索（支持 PDF/图片）
            - 自定义玻璃模糊背景

            ### 环境要求
            - Windows / Linux / macOS
            - Python 3.8+（需安装 `rapidocr_onnxruntime` 和 `PyMuPDF`）

            ### 安装 Python 依赖
            ```bash
            pip install rapidocr_onnxruntime PyMuPDF
            ```

            ### 版本说明
            - **Self-Contain** — 独立版本，无需安装 .NET 运行时，下载后直接运行，体积较大
            - **无后缀** — 依赖框架版本，需先安装 [.NET 9 运行时](https://dotnet.microsoft.com/download/dotnet/9.0)，体积较小

            ### 下载
            | 平台 | 依赖框架 | Self-Contained |
            |------|----------|----------------|
            | Windows x64 | `PDFOCRTarget-win-x64.exe` | `PDFOCRTarget-win-x64-Self-Contain.exe` |
            | Linux x64 | `PDFOCRTarget-linux-x64` | `PDFOCRTarget-linux-x64-Self-Contain` |
            | macOS ARM64 | `PDFOCRTarget-osx-arm64` | `PDFOCRTarget-osx-arm64-Self-Contain` |
          files: |
            artifacts/PDFOCRTarget-win-x64-Self-Contain.exe/PDFOCRTarget-win-x64-Self-Contain.exe
            artifacts/PDFOCRTarget-win-x64.exe/PDFOCRTarget-win-x64.exe
            artifacts/PDFOCRTarget-linux-x64-Self-Contain/PDFOCRTarget-linux-x64-Self-Contain
            artifacts/PDFOCRTarget-linux-x64/PDFOCRTarget-linux-x64
            artifacts/PDFOCRTarget-osx-arm64-Self-Contain/PDFOCRTarget-osx-arm64-Self-Contain
            artifacts/PDFOCRTarget-osx-arm64/PDFOCRTarget-osx-arm64
          draft: false
          prerelease: false
