name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: .exe
            asset_name: PDFOCRTarget-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            ext: ''
            asset_name: PDFOCRTarget-linux-x64
          - os: macos-latest
            rid: osx-arm64
            ext: ''
            asset_name: PDFOCRTarget-osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish

      - name: Find and rename binary
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            # Windows: find the exe
            if [ -f "publish/PDFOCRTarget.exe" ]; then
              cp "publish/PDFOCRTarget.exe" "${{ matrix.asset_name }}"
            else
              echo "ERROR: PDFOCRTarget.exe not found"
              ls -la publish/
              exit 1
            fi
          else
            if [ -f "publish/PDFOCRTarget" ]; then
              cp "publish/PDFOCRTarget" "${{ matrix.asset_name }}"
              chmod +x "${{ matrix.asset_name }}"
            else
              echo "ERROR: PDFOCRTarget binary not found"
              ls -la publish/
              exit 1
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PDFOCRTarget ${{ github.ref_name }}
          body: |
            ## PDFOCRTarget ${{ github.ref_name }}
            
            全平台 PDF 图片转文字 OCR 识别转换工具
            
            ### 功能
            - OCR 文字识别（图片/扫描版 PDF）
            - PDF 照片转可搜索 PDF 文本
            - 关键词搜索（支持 PDF/图片）
            - 自定义玻璃模糊背景
            
            ### 环境要求
            - Windows / Linux / macOS
            - Python 3.8+（需安装 `rapidocr_onnxruntime` 和 `PyMuPDF`）
            
            ### 安装 Python 依赖
            ```bash
            pip install rapidocr_onnxruntime PyMuPDF
            ```
            
            ### 下载
            请根据您的系统下载对应版本：
            - `win-x64` — Windows 64位
            - `linux-x64` — Linux 64位
            - `osx-arm64` — macOS Apple Silicon
          files: |
            artifacts/PDFOCRTarget-win-x64.exe/PDFOCRTarget-win-x64.exe
            artifacts/PDFOCRTarget-linux-x64/PDFOCRTarget-linux-x64
            artifacts/PDFOCRTarget-osx-arm64/PDFOCRTarget-osx-arm64
          draft: false
          prerelease: false
